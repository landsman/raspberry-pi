# IPv6 server — returns the client's IPv6 address (falls back to IPv4 if IPv6 is unavailable)
server {
    listen 81;
    listen [::]:81;
    server_name _;

    location /api/my-ipv6 {
        default_type application/json;
        set $real_ip $http_x_forwarded_for;
        if ($real_ip = '') {
            set $real_ip $remote_addr;
        }
        return 200 '{"ip":"$real_ip"}';
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Local IP detection — returns real client IPv4 address.
    # When accessed via Vite dev proxy, use X-Forwarded-For (set by the proxy);
    # fall back to $remote_addr when accessed directly (production).
    location /api/my-ip {
        default_type application/json;
        set $real_ip $http_x_forwarded_for;
        if ($real_ip = '') {
            set $real_ip $remote_addr;
        }
        return 200 '{"ip":"$real_ip"}';
    }

    # Proxy: bypass CORS for upstream APIs
    location /proxy/status-codeberg-org/ {
        proxy_pass https://status.codeberg.org/;
        proxy_ssl_server_name on;
    }

    location /proxy/slack-status-com/ {
        proxy_pass https://slack-status.com/;
        proxy_ssl_server_name on;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

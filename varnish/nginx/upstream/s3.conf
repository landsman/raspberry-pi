location /files/ {
    # Strip the /files/ prefix before forwarding to S3
    rewrite ^/files/(.*)$ /$1 break;

    proxy_pass https://your-bucket.s3.amazonaws.com;

    # S3 requires the bucket hostname, not the original client host
    proxy_set_header Host your-bucket.s3.amazonaws.com;

    # S3 does not need these headers — strip them
    proxy_set_header Authorization "";
    proxy_set_header X-Forwarded-For "";
    proxy_set_header X-Forwarded-Proto "";
    proxy_set_header X-Forwarded-Host "";

    # Cache S3 responses aggressively — files rarely change
    proxy_cache_valid 200 1d;
}

location / {
    proxy_pass http://frontend:3000;

    # Pass the original Host header the client used
    proxy_set_header Host $host;

    # Pass through the real client IP set by Varnish (not Varnish's own IP)
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Tell the app whether the original request was http or https
    proxy_set_header X-Forwarded-Proto $scheme;

    # Pass the original Host header for apps that need to know the domain
    proxy_set_header X-Forwarded-Host $host;
}

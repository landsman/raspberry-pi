server {
    listen 8080;

    # Frontend — serves the main web app (e.g. React, Next.js, static site)
    include /etc/nginx/conf.d/upstream/frontend.conf;

    # Backend API — routes /api/* to your backend service
    include /etc/nginx/conf.d/upstream/backend.conf;

    # S3 — routes /files/* to an S3-compatible bucket (AWS, MinIO, Cloudflare R2, etc.)
    include /etc/nginx/conf.d/upstream/s3.conf;
}

services:
  varnish:
    image: varnish:7.7
    container_name: varnish
    restart: unless-stopped
    depends_on:
      - nginx
    ports:
      - "6081:80"
    volumes:
      - ./default.vcl:/etc/varnish/default.vcl:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["sh", "/entrypoint.sh"]
    environment:
      - VARNISH_SIZE=${VARNISH_SIZE:-256m}
      - VARNISH_PURGE_TOKEN=${VARNISH_PURGE_TOKEN}
      - VARNISH_PURGE_IPS=${VARNISH_PURGE_IPS}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  nginx:
    image: nginx:alpine
    container_name: varnish-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/upstream:/etc/nginx/conf.d/upstream:ro
    expose:
      - "8080"

services:
  supabase:
    build: .
    image: supabase-runner:latest
    restart: always
    environment:
      RUNNER_SCOPE: repo
      REPO_URL: ${SUPABASE_REPO_URL}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      LABELS: self-hosted,pi5
      EPHEMERAL: "true"
    volumes:
      - /run/user/1001/docker.sock:/var/run/docker.sock

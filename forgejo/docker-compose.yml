services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:13
    container_name: forgejo
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      FORGEJO__server__ROOT_URL: ${FORGEJO_URL}
    networks:
      - forgejo
    ports:
      - '3000:3000'
      - '222:22'
    volumes:
      - data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

networks:
  forgejo:
    external: false

volumes:
  data:

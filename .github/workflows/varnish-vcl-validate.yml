name: "varnish vcl validate"

on:
  pull_request:
    paths:
      - 'varnish/**'

jobs:
  validate:
    # Self-hosted runner on Raspberry Pi 5 — see: ./github-runner/README.md
    runs-on: [self-hosted, pi5]

    steps:
      - uses: actions/checkout@v6

      - name: "Validate VCL syntax"
        run: make vcl-validate
        working-directory: varnish
        env:
          VARNISH_PURGE_IPS_ACL: '"10.0.0.1";'
          VARNISH_PURGE_TOKEN: dummy
          VARNISH_PURGE_TOKEN_CMS: dummy
          VARNISH_DEBUG: "true"

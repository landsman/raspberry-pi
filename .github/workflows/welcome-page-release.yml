name: "welcome-page release"

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'welcome-page/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/homelab-status

jobs:
  release:
    # Self-hosted runner on Raspberry Pi 5 — see ./github-runner/README.md
    runs-on: [self-hosted, pi5]
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: welcome-page

    steps:
      - uses: actions/checkout@v6

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Log in to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and push"
        run: make ci-release
        env:
          REGISTRY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          GIT_SHA: ${{ github.sha }}

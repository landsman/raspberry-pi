name: "varnish purge"

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Newline-separated paths to purge"
        required: true
        default: |
          /
  workflow_call:
    inputs:
      urls:
        description: "Newline-separated paths to purge"
        required: true
        type: string

jobs:
  purge:
    # Self-hosted runner on Raspberry Pi 5 — see: ./github-runner/README.md
    runs-on: [self-hosted, pi5]

    steps:
      - uses: actions/checkout@v6

      - name: "Purge URLs"
        env:
          VARNISH_HOST: ${{ vars.VARNISH_HOST }}
          VARNISH_PURGE_TOKEN: ${{ secrets.VARNISH_PURGE_TOKEN }}
        run: echo "${{ inputs.urls }}" | sh varnish/purge.sh

services:
  postgres17:
    image: postgres:17
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
    ports:
      - "5432:5432"
    volumes:
      - postgres17:/var/lib/postgresql/data

  adminer:
    image: dockette/adminer:dg
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres17
      - ADMINER_DEFAULT_SYSTEM=postgres
    depends_on:
      - postgres17

volumes:
  postgres17:

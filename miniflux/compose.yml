services:
  miniflux:
    image: ghcr.io/miniflux/miniflux:2.2.4
    container_name: miniflux
    restart: unless-stopped
    ports:
      - "8002:8080"
    env_file:
      - .env
    environment:
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
    healthcheck:
      test: ["CMD", "miniflux", "-healthcheck", "auto"]
      interval: 30s
      timeout: 3s
      retries: 3
